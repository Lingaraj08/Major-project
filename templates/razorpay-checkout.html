{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Checkout - HealthStack</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .checkout-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .payment-details {
            margin: 20px 0;
            text-align: left;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
        }
        .detail-label {
            font-weight: bold;
            color: #666;
        }
        .detail-value {
            color: #333;
        }
        #rzp-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }
        #rzp-button:hover {
            transform: scale(1.05);
        }
        .status-message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>💳 Healthcare Payment</h1>
        <p>Complete your payment to continue with your appointment</p>
        
        <div class="payment-details">
            <div class="detail-row">
                <span class="detail-label">Amount:</span>
                <span class="detail-value">₹{{ amount|floatformat:2 }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Patient:</span>
                <span class="detail-value">{{ patient_name }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Email:</span>
                <span class="detail-value">{{ patient_email }}</span>
            </div>
        </div>

        <button id="rzp-button">Pay Now</button>
        <div id="status-message" class="status-message"></div>
    </div>

    <script>
        document.getElementById('rzp-button').addEventListener('click', function(e) {
            e.preventDefault();
            
            var options = {
                key: '{{ razorpay_merchant_key }}',
                amount: {{ amount }},
                currency: 'INR',
                name: 'HealthStack',
                description: 'Healthcare Payment',
                order_id: '{{ razorpay_order_id }}',
                handler: function(response) {
                    verifyPayment(response);
                },
                prefill: {
                    name: '{{ patient_name }}',
                    email: '{{ patient_email }}',
                    contact: '{{ patient_phone }}'
                },
                theme: {
                    color: '#0066cc'
                },
                modal: {
                    ondismiss: function() {
                        console.log('Checkout form closed');
                    }
                }
            };

            var rzp = new Razorpay(options);
            rzp.open();
        });

        function verifyPayment(response) {
            var data = {
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_signature: response.razorpay_signature
            };

            fetch('/razorpay/verify-payment/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(data)
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.status === 'success') {
                    showMessage('Payment successful! Redirecting...', 'success');
                    setTimeout(function() {
                        window.location.href = data.redirect_url || '/dashboard/';
                    }, 2000);
                } else {
                    showMessage('Payment verification failed: ' + data.message, 'error');
                }
            })
            .catch(function(error) {
                console.error('Error:', error);
                showMessage('An error occurred. Please try again.', 'error');
            });
        }

        function showMessage(message, type) {
            var statusDiv = document.getElementById('status-message');
            statusDiv.textContent = message;
            statusDiv.className = 'status-message ' + type;
            statusDiv.style.display = 'block';
        }

        function getCookie(name) {
            var cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
