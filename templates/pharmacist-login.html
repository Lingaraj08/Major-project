{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>HealthStack - Pharmacist Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0" />

    <!-- Favicons -->
    <link type="image/x-icon" href="{% static 'HealthStack-System/images/Normal/favicon.png' %}" rel="icon" />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'HealthStack-System/css/Normal/bootstrap.min.css' %}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" href="{% static 'HealthStack-System/plugins/Normal/fontawesome/css/fontawesome.min.css' %}" />
    <link rel="stylesheet" href="{% static 'HealthStack-System/plugins/Normal/fontawesome/css/all.min.css' %}" />

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'HealthStack-System/css/Normal/style.css' %}" />

    <style>
        .account-page {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .account-content {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        .login-header h3 {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .login-header span {
            color: #764ba2;
        }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .login-left {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-left img {
            max-width: 100%;
            height: auto;
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .patient-link {
            text-align: center;
            margin-top: 20px;
        }
        .patient-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            margin: 0 5px;
        }
    </style>
</head>
<body class="account-page">
    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Header -->
        <header class="header">{% include 'navbar_home.html' %}</header>
        <!-- /Header -->

        <!-- Page Content -->
        <div class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-8 offset-md-2">
                        <!-- Login Tab Content -->
                        <div class="account-content">
                            <div class="row align-items-center justify-content-center">
                                <div class="col-md-7 col-lg-6 login-left d-none d-lg-block">
                                    <img src="{% static 'HealthStack-System/images/Normal/login-banner.png' %}" class="img-fluid" alt="Pharmacist Login" />
                                </div>
                                <div class="col-md-12 col-lg-6 login-right">
                                    <div class="login-header">
                                        <h3>
                                            <i class="fas fa-pills" style="color: #667eea; margin-right: 10px;"></i>
                                            Pharmacist <span>Login</span>
                                        </h3>
                                    </div>

                                    <form method="POST" action="{% url 'pharmacist-login' %}">
                                        {% csrf_token %}

                                        {% include 'message.html' %}

                                        <div class="form-floating mt-3 mb-3">
                                            <input type="text" class="form-control" name='username' id="floatingInput" placeholder="User Name" required>
                                            <label for="floatingInput"><i class="fas fa-user" style="margin-right: 5px;"></i>User Name</label>
                                        </div>

                                        <div class="form-floating mb-3">
                                            <input type="password" class="form-control" name='password' id="floatingPassword" placeholder="Password" required>
                                            <label for="floatingPassword"><i class="fas fa-lock" style="margin-right: 5px;"></i>Password</label>
                                        </div>

                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Login
                                        </button>
                                    </form>

                                    <div class="patient-link">
                                        <p>
                                            Not a Pharmacist?
                                            <a href="{% url 'login' %}">Login as Patient</a> |
                                            <a href="{% url 'doctor-login' %}">Login as Doctor</a>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="{% static 'HealthStack-System/js/jquery-3.2.1.min.js' %}"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtCeKPIbYS12X6ucbSvLqoellk7abD0//kqvE0NzfLlWY5n" crossorigin="anonymous"></script>
</body>
</html>
